[build]
builder = "NIXPACKS"
# Nixpacks já roda `npm ci` na fase install; evitar segundo npm ci no build.
buildCommand = "echo 'backend: dependencias instaladas na fase install'"

[deploy]
startCommand = "node backend/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
