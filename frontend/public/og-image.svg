<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="CRASH Cifras  Cifras para músicos">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0b"/>
      <stop offset="55%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#12100e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0"/>
      <stop offset="50%" stop-color="#F97316" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000" flood-opacity="0.55"/>
      <feDropShadow dx="0" dy="0" stdDeviation="1" flood-color="#F97316" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <circle cx="180" cy="120" r="280" fill="#F97316" opacity="0.04"/>
  <circle cx="1050" cy="520" r="220" fill="#F97316" opacity="0.06"/>

  <!-- Marca (esquerda) -->
  <text x="72" y="248" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="88" font-weight="800" fill="#ffffff" letter-spacing="-2">CRASH</text>
  <text x="72" y="338" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="88" font-weight="800" fill="#F97316" letter-spacing="-2">Cifras</text>
  <text x="74" y="400" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="26" font-weight="500" fill="#a1a1aa">Cifras para músicos</text>

  <!-- Botőes -->
  <rect x="72" y="448" width="200" height="48" rx="24" fill="#F97316"/>
  <text x="172" y="479" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="18" font-weight="700" fill="#09090b">20 dias grátis</text>

  <rect x="288" y="448" width="268" height="48" rx="24" fill="none" stroke="#3f3f46" stroke-width="2"/>
  <text x="422" y="479" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="17" font-weight="600" fill="#e4e4e7">crashcifras.com.br</text>

  <!-- Card teleprompter (direita) -->
  <g filter="url(#cardShadow)">
    <rect x="620" y="88" width="508" height="454" rx="20" fill="#18181b" stroke="#27272a" stroke-width="2"/>
    <rect x="620" y="88" width="508" height="56" rx="20" fill="#27272a"/>
    <rect x="620" y="128" width="508" height="16" fill="#27272a"/>

    <!-- Barra superior do card -->
    <circle cx="652" cy="116" r="7" fill="#ef4444" opacity="0.85"/>
    <circle cx="676" cy="116" r="7" fill="#eab308" opacity="0.85"/>
    <circle cx="700" cy="116" r="7" fill="#22c55e" opacity="0.85"/>
    <text x="748" y="122" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#71717a">Teleprompter</text>
    <rect x="1020" y="100" width="72" height="32" rx="8" fill="#F97316" opacity="0.2" stroke="#F97316" stroke-width="1"/>
    <text x="1056" y="121" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#F97316">72 BPM</text>

    <!-- Acordes -->
    <text x="660" y="210" font-family="ui-monospace, Consolas, monospace" font-size="42" font-weight="700" fill="#F97316">E</text>
    <text x="760" y="210" font-family="ui-monospace, Consolas, monospace" font-size="42" font-weight="700" fill="#F97316">B</text>
    <text x="860" y="210" font-family="ui-monospace, Consolas, monospace" font-size="42" font-weight="700" fill="#F97316">C#m</text>
    <text x="1000" y="210" font-family="ui-monospace, Consolas, monospace" font-size="42" font-weight="700" fill="#F97316">A</text>

    <!-- Graus -->
    <text x="668" y="248" font-family="ui-monospace, Consolas, monospace" font-size="20" font-weight="600" fill="#71717a">I</text>
    <text x="772" y="248" font-family="ui-monospace, Consolas, monospace" font-size="20" font-weight="600" fill="#71717a">V</text>
    <text x="888" y="248" font-family="ui-monospace, Consolas, monospace" font-size="20" font-weight="600" fill="#71717a">VI</text>
    <text x="1012" y="248" font-family="ui-monospace, Consolas, monospace" font-size="20" font-weight="600" fill="#71717a">IV</text>

    <!-- Letra (decorativa) -->
    <rect x="660" y="290" width="420" height="12" rx="4" fill="#3f3f46"/>
    <rect x="660" y="318" width="380" height="12" rx="4" fill="#27272a"/>
    <rect x="660" y="346" width="400" height="12" rx="4" fill="#27272a"/>
    <rect x="660" y="374" width="320" height="12" rx="4" fill="#27272a"/>
    <rect x="660" y="418" width="200" height="10" rx="4" fill="#F97316" opacity="0.35"/>

    <!-- Indicador de linha ativa -->
    <rect x="648" y="278" width="4" height="108" rx="2" fill="#F97316"/>
  </g>
</svg>
